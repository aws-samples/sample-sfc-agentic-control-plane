openapi: "3.0.3"
info:
  title: SFC Control Plane API
  description: >
    HTTP API for the SFC Config Agent Control Plane.
    Manages SFC configurations, launch packages, IoT provisioning,
    log retrieval, Greengrass components, runtime controls, and AI remediation.
  version: "1.0.0"

x-amazon-apigateway-cors:
  allowOrigins:
    - "*"
  allowMethods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowHeaders:
    - Content-Type
    - Authorization
    - X-Amz-Date
    - X-Api-Key
    - X-Amz-Security-Token
  maxAge: 300

# Global security — all routes require a valid Cognito JWT unless overridden.
# The Lambda authorizer (fn-authorizer) validates RS256-signed id_tokens / access_tokens.
security:
  - CognitoJwt: []

tags:
  - name: configs
    description: SFC configuration file management
  - name: packages
    description: Launch package lifecycle
  - name: iot
    description: IoT provisioning lifecycle
  - name: logs
    description: CloudWatch OTEL log retrieval
  - name: greengrass
    description: Greengrass v2 component management
  - name: control
    description: Runtime device control channel
  - name: remediation
    description: AI-assisted configuration remediation

paths:

  # ────────────────────────────────────────────────────────────────
  # Config Management
  # ────────────────────────────────────────────────────────────────

  /configs:
    get:
      operationId: listConfigs
      summary: List all SFC configurations (latest version per configId)
      tags: [configs]
      responses:
        "200":
          description: List of config summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  configs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConfigSummary"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"
    post:
      operationId: createConfig
      summary: Create a new SFC configuration
      tags: [configs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConfigRequest"
      responses:
        "200":
          description: Configuration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  /configs/focus:
    get:
      operationId: getConfigFocus
      summary: Get the current config in focus
      tags: [configs]
      responses:
        "200":
          description: Currently focused config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusState"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"
    delete:
      operationId: clearConfigFocus
      summary: Clear the current config focus (no config in focus)
      tags: [configs]
      responses:
        "200":
          description: Focus cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusState"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  /configs/{configId}:
    get:
      operationId: getConfig
      summary: Get latest version metadata and content for a config
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
      responses:
        "200":
          description: Config detail with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"
    delete:
      operationId: deleteConfig
      summary: Soft-delete a config (marks all versions as deleted in DDB; no data removed)
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
      responses:
        "200":
          description: Config soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"
    put:
      operationId: saveConfig
      summary: Save a new version of a config
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveConfigRequest"
      responses:
        "200":
          description: New version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  /configs/{configId}/tags:
    patch:
      operationId: updateConfigTags
      summary: Update tags on a config (latest version)
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
              required: [tags]
      responses:
        "200":
          description: Tags updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  configId:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  /configs/{configId}/focus:
    post:
      operationId: setConfigFocus
      summary: Set a config version as in focus
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFocusRequest"
      responses:
        "200":
          description: Focus updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusState"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  /configs/{configId}/versions:
    get:
      operationId: listConfigVersions
      summary: List all versions of a config
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConfigSummary"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  /configs/{configId}/versions/{version}:
    get:
      operationId: getConfigVersion
      summary: Get a specific version of a config
      tags: [configs]
      parameters:
        - $ref: "#/components/parameters/configId"
        - $ref: "#/components/parameters/version"
      responses:
        "200":
          description: Config version detail with content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnConfigsArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # Launch Package Management
  # ────────────────────────────────────────────────────────────────

  /packages:
    post:
      operationId: createPackage
      summary: Create a new launch package (full orchestration)
      tags: [packages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageRequest"
      responses:
        "200":
          description: Package created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePackageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLaunchPkgArn}"
        payloadFormatVersion: "2.0"
    get:
      operationId: listPackages
      summary: List all launch packages
      tags: [packages]
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: object
                properties:
                  packages:
                    type: array
                    items:
                      $ref: "#/components/schemas/PackageSummary"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLaunchPkgArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}:
    get:
      operationId: getPackage
      summary: Get package details
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Package detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLaunchPkgArn}"
        payloadFormatVersion: "2.0"
    delete:
      operationId: deletePackage
      summary: Delete a launch package record
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "204":
          description: Package deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLaunchPkgArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/tags:
    patch:
      operationId: updatePackageTags
      summary: Update tags on a launch package
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/packageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tags:
                  type: array
                  items:
                    type: string
              required: [tags]
      responses:
        "200":
          description: Tags updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  packageId:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLaunchPkgArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/download:
    get:
      operationId: getPackageDownloadUrl
      summary: Generate a presigned S3 URL to download the launch package zip
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Presigned download URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl:
                    type: string
                    format: uri
                  expiresIn:
                    type: integer
                    description: TTL in seconds
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLaunchPkgArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # IoT Provisioning
  # ────────────────────────────────────────────────────────────────

  /packages/{packageId}/iot:
    post:
      operationId: reprovisionIot
      summary: Re-provision IoT credentials for a package (mints fresh cert)
      tags: [iot]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: New package record created with fresh credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IotProvisioningStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotProvArn}"
        payloadFormatVersion: "2.0"
    get:
      operationId: getIotStatus
      summary: Get IoT provisioning status and resource ARNs
      tags: [iot]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: IoT provisioning status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IotProvisioningStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotProvArn}"
        payloadFormatVersion: "2.0"
    delete:
      operationId: revokeIot
      summary: Revoke certificate and delete IoT Thing
      tags: [iot]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: IoT resources revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotProvArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # Log Retrieval
  # ────────────────────────────────────────────────────────────────

  /packages/{packageId}/logs:
    get:
      operationId: getPackageLogs
      summary: Retrieve paginated OTEL log events for a package
      tags: [logs]
      parameters:
        - $ref: "#/components/parameters/packageId"
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
        - name: nextToken
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 5000
        - name: lookbackMinutes
          in: query
          description: How far back to look (in minutes). Ignored when startTime is provided. Max 720 (12 h).
          schema:
            type: integer
            default: 15
            minimum: 1
            maximum: 720
      responses:
        "200":
          description: Log events page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsPage"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLogsArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/logs/errors:
    get:
      operationId: getPackageErrorLogs
      summary: Retrieve ERROR-severity log events for a time window
      tags: [logs]
      parameters:
        - $ref: "#/components/parameters/packageId"
        - name: startTime
          in: query
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Error log events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsPage"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnLogsArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # Greengrass Component
  # ────────────────────────────────────────────────────────────────

  /packages/{packageId}/greengrass:
    post:
      operationId: createGreengrassComponent
      summary: Create a Greengrass v2 component version from a READY launch package
      tags: [greengrass]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Component created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreengrassStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnGgCompArn}"
        payloadFormatVersion: "2.0"
    get:
      operationId: getGreengrassStatus
      summary: Get Greengrass component ARN and deployment status
      tags: [greengrass]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Greengrass component status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GreengrassStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnGgCompArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # Runtime Control
  # ────────────────────────────────────────────────────────────────

  /packages/{packageId}/control:
    get:
      operationId: getControlState
      summary: Get persisted runtime control state for a package
      tags: [control]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Current control state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ControlState"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotControlArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/control/diagnostics:
    put:
      operationId: setDiagnostics
      summary: Toggle diagnostics (TRACE log level) on/off for a package
      tags: [control]
      parameters:
        - $ref: "#/components/parameters/packageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleRequest"
      responses:
        "200":
          description: Diagnostics state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotControlArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/control/config-update:
    post:
      operationId: pushConfigUpdate
      summary: Push a config update to a running edge device
      tags: [control]
      parameters:
        - $ref: "#/components/parameters/packageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdateRequest"
      responses:
        "200":
          description: Config update dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotControlArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/control/restart:
    post:
      operationId: restartSfc
      summary: Trigger a graceful SFC subprocess restart on the edge device
      tags: [control]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Restart command dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotControlArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/heartbeat:
    get:
      operationId: getHeartbeat
      summary: Get the latest heartbeat state for a package
      tags: [control]
      parameters:
        - $ref: "#/components/parameters/packageId"
      responses:
        "200":
          description: Heartbeat state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatState"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnIotControlArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # Tag & Endpoint Extraction
  # ────────────────────────────────────────────────────────────────

  /configs/tags/extract:
    post:
      operationId: extractTags
      summary: Extract PLC tags and network endpoints from arbitrary documentation text
      description: >
        Sends the provided text to Amazon Bedrock (Claude) and returns a structured
        list of PLC devices, each with their network endpoint and tag definitions.
        The extraction is synchronous and typically completes within 30 seconds.
      tags: [configs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagExtractRequest"
      responses:
        "200":
          description: Extracted PLC tag groups and endpoints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagExtractResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnTagExtractArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # AI-Guided Config Generation
  # ────────────────────────────────────────────────────────────────

  /configs/generate:
    post:
      operationId: generateConfig
      summary: Start AI-guided SFC config generation (async — returns 202 + jobId)
      tags: [configs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateConfigRequest"
      responses:
        "202":
          description: Generation job accepted — poll GET /configs/generate/{jobId} for status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateConfigJobAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnAgentCreateConfigArn}"
        payloadFormatVersion: "2.0"

  /configs/generate/{jobId}:
    get:
      operationId: pollGenerateConfig
      summary: Poll the status of an AI config generation job
      tags: [configs]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status (PENDING / COMPLETE / FAILED)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateConfigJobStatus"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnAgentCreateConfigArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # CloudWatch Metrics Dashboard
  # ────────────────────────────────────────────────────────────────

  /packages/{packageId}/metrics:
    post:
      operationId: getPackageMetrics
      summary: >
        Query CloudWatch SFC metrics for a launch package and return
        Chart.js-formatted datasets (last 15 min, 60-second period).
      tags: [packages]
      parameters:
        - $ref: "#/components/parameters/packageId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MetricsRequest"
      responses:
        "200":
          description: Array of Chart.js dataset objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartJsDataset"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnMetricsArn}"
        payloadFormatVersion: "2.0"

  # ────────────────────────────────────────────────────────────────
  # AI Remediation
  # ────────────────────────────────────────────────────────────────

  /packages/{packageId}/remediate:
    post:
      operationId: triggerRemediation
      summary: Invoke AI remediation for a package error window
      tags: [remediation]
      parameters:
        - $ref: "#/components/parameters/packageId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemediateRequest"
      responses:
        "200":
          description: Remediation complete — corrected config returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "504":
          description: AgentCore invocation timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnAgentRemediateArn}"
        payloadFormatVersion: "2.0"

  /packages/{packageId}/remediate/{sessionId}:
    get:
      operationId: getRemediationStatus
      summary: Poll remediation session status (async fallback)
      tags: [remediation]
      parameters:
        - $ref: "#/components/parameters/packageId"
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Remediation session status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediateStatusResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: "${FnAgentRemediateArn}"
        payloadFormatVersion: "2.0"

# ──────────────────────────────────────────────────────────────────
# Reusable components
# ──────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    CognitoJwt:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authorizer:
        type: request
        authorizerPayloadFormatVersion: "2.0"
        enableSimpleResponses: true
        identitySource: "$request.header.Authorization"
        authorizerUri: "${FnAuthorizerArn}"
        authorizerResultTtlInSeconds: 300

  parameters:
    configId:
      name: configId
      in: path
      required: true
      schema:
        type: string
    version:
      name: version
      in: path
      required: true
      schema:
        type: string
    packageId:
      name: packageId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict — e.g. package not in READY state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ── Configs ──────────────────────────────────────────────────

    ConfigSummary:
      type: object
      properties:
        configId:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
          description: ISO-8601 timestamp used as version key
        s3Key:
          type: string
        status:
          type: string
          enum: [active, archived]
        createdAt:
          type: string
          format: date-time
      required: [configId, version, status]

    ConfigDetail:
      allOf:
        - $ref: "#/components/schemas/ConfigSummary"
        - type: object
          properties:
            content:
              type: object
              description: Parsed SFC config JSON
              additionalProperties: true

    FocusState:
      type: object
      properties:
        stateKey:
          type: string
        focusedConfigId:
          type: string
        focusedConfigVersion:
          type: string
        updatedAt:
          type: string
          format: date-time
      required: [stateKey]

    CreateConfigRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        content:
          type: object
          additionalProperties: true
      required: [name, content]

    SaveConfigRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        content:
          type: object
          additionalProperties: true
      required: [content]

    SetFocusRequest:
      type: object
      properties:
        version:
          type: string
      required: [version]

    # ── Packages ─────────────────────────────────────────────────

    CreatePackageRequest:
      type: object
      properties:
        configId:
          type: string
          description: Config to snapshot (overrides focus if provided)
        configVersion:
          type: string
          description: Version of the config; defaults to the focused version
        region:
          type: string
          description: AWS region for IoT/SFC resources (defaults to stack region)

    CreatePackageResponse:
      type: object
      properties:
        packageId:
          type: string
        status:
          type: string
          enum: [PROVISIONING, READY, ERROR]
        downloadUrl:
          type: string
          format: uri
      required: [packageId, status]

    PackageSummary:
      type: object
      properties:
        packageId:
          type: string
        configId:
          type: string
        configVersion:
          type: string
        status:
          type: string
          enum: [PROVISIONING, READY, ERROR]
        createdAt:
          type: string
          format: date-time
        iotThingName:
          type: string
        logGroupName:
          type: string
        sourcePackageId:
          type: string
      required: [packageId, status, createdAt]

    PackageDetail:
      allOf:
        - $ref: "#/components/schemas/PackageSummary"
        - type: object
          properties:
            iotCertArn:
              type: string
            iotRoleAliasArn:
              type: string
            iamRoleArn:
              type: string
            s3ZipKey:
              type: string
            ggComponentArn:
              type: string
            diagnosticsEnabled:
              type: boolean
            lastConfigUpdateAt:
              type: string
            lastConfigUpdateVersion:
              type: string
            lastRestartAt:
              type: string

    # ── IoT ──────────────────────────────────────────────────────

    IotProvisioningStatus:
      type: object
      properties:
        packageId:
          type: string
        iotThingName:
          type: string
        iotCertArn:
          type: string
        iotRoleAliasArn:
          type: string
        iamRoleArn:
          type: string
        status:
          type: string
          enum: [PROVISIONING, READY, ERROR]
      required: [packageId, status]

    # ── Logs ─────────────────────────────────────────────────────

    LogRecord:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        severityText:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR]
        severityNumber:
          type: integer
        body:
          type: string
        resource:
          type: object
          additionalProperties: true
        attributes:
          type: object
          additionalProperties: true

    LogsPage:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/LogRecord"
        nextToken:
          type: string
          description: Pagination token; absent when no further pages
      required: [records]

    # ── Greengrass ────────────────────────────────────────────────

    GreengrassStatus:
      type: object
      properties:
        packageId:
          type: string
        ggComponentArn:
          type: string
        componentName:
          type: string
        componentVersion:
          type: string
        deploymentStatus:
          type: string
          description: GGv2 deployment status string (COMPLETED, FAILED, IN_PROGRESS, etc.)
      required: [packageId]

    # ── Control ───────────────────────────────────────────────────

    ControlState:
      type: object
      properties:
        packageId:
          type: string
        diagnosticsEnabled:
          type: boolean
        lastConfigUpdateAt:
          type: string
          format: date-time
        lastConfigUpdateVersion:
          type: string
        lastRestartAt:
          type: string
          format: date-time
      required: [packageId]

    ToggleRequest:
      type: object
      properties:
        enabled:
          type: boolean
      required: [enabled]

    ConfigUpdateRequest:
      type: object
      properties:
        configId:
          type: string
        configVersion:
          type: string
      required: [configId, configVersion]

    HeartbeatState:
      type: object
      properties:
        packageId:
          type: string
        lastHeartbeatAt:
          type: string
          format: date-time
        sfcRunning:
          type: boolean
        recentLogs:
          type: array
          items:
            type: string
          maxItems: 3
        liveStatus:
          type: string
          enum: [ACTIVE, ERROR, INACTIVE]
      required: [packageId, liveStatus]

    # ── AI-Guided Config Generation ───────────────────────────────

    GenerateConfigRequest:
      type: object
      properties:
        name:
          type: string
          description: Human-readable name for the new config
        description:
          type: string
          description: Optional description
        protocol:
          type: string
          description: Industrial protocol (e.g. OPC-UA, Modbus TCP, MQTT, S7)
          default: OPC-UA
        targets:
          type: array
          description: List of host/endpoint connections
          items:
            type: object
            properties:
              host:
                type: string
                description: Hostname, IP address, or endpoint URL
              port:
                type: integer
                description: TCP port number
        channels_description:
          type: string
          description: Free-text description of the data channels to collect
        sampling_interval_ms:
          type: integer
          description: Sampling interval in milliseconds
          default: 1000
        additional_context:
          type: string
          description: >
            Any extra free-text requirements, constraints, or notes that do not fit
            the structured fields above (e.g. security mode, certificate paths,
            retry behaviour, special register mappings).
      required: [name]

    GenerateConfigJobAccepted:
      type: object
      properties:
        jobId:
          type: string
          description: Opaque job ID — use with GET /configs/generate/{jobId}
        status:
          type: string
          enum: [PENDING]
      required: [jobId, status]

    GenerateConfigJobStatus:
      type: object
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETE, FAILED]
        configId:
          type: string
          description: Present when status is COMPLETE
        version:
          type: string
          description: Present when status is COMPLETE
        name:
          type: string
        error:
          type: string
          description: Present when status is FAILED
      required: [jobId, status]

    GenerateConfigResponse:
      type: object
      properties:
        configId:
          type: string
          description: ID of the newly persisted config
        version:
          type: string
          description: ISO-8601 version key
        name:
          type: string
        generatedConfig:
          type: object
          additionalProperties: true
          description: The AI-generated SFC configuration JSON
      required: [configId, version, name, generatedConfig]

    # ── Tag Extraction ────────────────────────────────────────────

    TagExtractRequest:
      type: object
      properties:
        protocol:
          type: string
          description: SFC adapter id providing context for extraction (e.g. S7, OPCUA, Modbus)
        docText:
          type: string
          description: Arbitrary PLC documentation text (max 100,000 characters)
          maxLength: 100000
      required: [docText]

    ExtractedTag:
      type: object
      properties:
        address:
          type: string
          description: Tag address as found in documentation (e.g. '%DB120:242:REAL', 'ns=2;i=1001')
        name:
          type: string
          description: Human-readable tag name
        dataType:
          type: string
          description: PLC data type (e.g. REAL, INT, BOOL, DINT)
        description:
          type: string
          description: Brief description of the tag
      required: [address, name, dataType]

    ExtractedEndpoint:
      type: object
      properties:
        ip:
          type: string
          description: IP address or hostname
        port:
          type: string
          description: Port number (as string) or null
        description:
          type: string
          description: Context description (e.g. 'Press PLC A')

    ExtractedPlc:
      type: object
      properties:
        plcId:
          type: string
          description: PLC or device identifier
        endpoint:
          $ref: "#/components/schemas/ExtractedEndpoint"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedTag"
      required: [plcId, tags]

    TagExtractResponse:
      type: object
      properties:
        plcs:
          type: array
          description: One entry per PLC/device found in the documentation
          items:
            $ref: "#/components/schemas/ExtractedPlc"
      required: [plcs]

    # ── Metrics Dashboard ─────────────────────────────────────────

    MetricsRequest:
      type: object
      properties:
        lookbackMinutes:
          type: integer
          description: How many minutes of history to query (default 15, max 1440)
          default: 15
          minimum: 1
          maximum: 1440
        category:
          type: string
          description: >
            SFC metric category to filter by. "Target" returns ingest/write metrics,
            "Core" returns SFC core metrics, "Adapter" returns adapter/read metrics,
            "All" returns all metrics for the package.
          enum: [Target, Core, Adapter, All]
          default: Target

    ChartJsDataPoint:
      type: object
      properties:
        x:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp
        y:
          type: number
          description: Metric value (average over the 60-second period)
      required: [x, y]

    ChartJsDataset:
      type: object
      properties:
        label:
          type: string
          description: Series label — format "<MetricName> · <Type> · <Source>"
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChartJsDataPoint"
          description: Data points sorted ascending by timestamp
        borderColor:
          type: string
          description: CSS hex colour for the line
        backgroundColor:
          type: string
          description: CSS hex colour (with alpha) for the fill area
        tension:
          type: number
          description: Chart.js line tension (0 = straight, 0.4 = curved)
        fill:
          type: boolean
          description: Whether to fill the area under the line
        pointRadius:
          type: integer
          description: Chart.js point radius in pixels
      required: [label, data, borderColor]

    # ── Remediation ───────────────────────────────────────────────

    RemediateRequest:
      type: object
      properties:
        errorWindowStart:
          type: string
          format: date-time
        errorWindowEnd:
          type: string
          format: date-time
      required: [errorWindowStart, errorWindowEnd]

    RemediateResponse:
      type: object
      properties:
        sessionId:
          type: string
        newConfigVersion:
          type: string
          description: Version key of the persisted corrected config
        correctedConfig:
          type: object
          additionalProperties: true
          description: Parsed corrected SFC config JSON
      required: [sessionId, newConfigVersion, correctedConfig]

    RemediateStatusResponse:
      type: object
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [PENDING, COMPLETE, FAILED]
        newConfigVersion:
          type: string
        correctedConfig:
          type: object
          additionalProperties: true
        errorMessage:
          type: string
      required: [sessionId, status]
